apiVersion: v1
kind: ConfigMap
metadata:
  name: documind-config
  namespace: documind
data:
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.2:3b"
  CHROMA_HOST: "chromadb"
  CHROMA_PORT: "8001"
  REDIS_URL: "redis://redis:6379"
  EMBED_MODEL: "all-MiniLM-L6-v2"
  LOG_LEVEL: "info"
  APP_ENV: "production"
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "64"
  TOP_K: "5"
  CACHE_TTL_SECONDS: "300"
  MAX_UPLOAD_SIZE_MB: "50"
