---
apiVersion: v1
kind: Service
metadata:
  name: documind-api
  namespace: documind
  labels:
    app: documind-api
spec:
  selector:
    app: documind-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: documind
spec:
  selector:
    app: chromadb
  ports:
    - port: 8001
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: documind
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: documind
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
