global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: documind
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── DocuMind FastAPI ────────────────────────────────────────────────────────
  - job_name: documind-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # ── ChromaDB ────────────────────────────────────────────────────────────────
  - job_name: chromadb
    static_configs:
      - targets: ["chromadb:8000"]
    metrics_path: /api/v1/metrics
    scrape_interval: 30s

  # ── Redis (requires redis-exporter sidecar in prod k8s) ─────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s

  # ── Prometheus self-scrape ───────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
