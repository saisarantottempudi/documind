version: "3.9"

# ── Production overrides ────────────────────────────────────────────────────────
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile    # production multi-stage image
    image: ghcr.io/saisarantottempudi/documind:latest
    volumes: []                         # no hot-reload volume mount
    environment:
      APP_ENV: production
      LOG_LEVEL: info
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  redis:
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme}
